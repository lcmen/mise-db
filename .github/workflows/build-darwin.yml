name: Build Darwin database binary

on:
  workflow_dispatch:
    inputs:
      tool:
        type: choice
        required: true
        options:
          - postgres
      version:
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ inputs.tool }} ${{ inputs.version }} ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-amd64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL build dependencies
        run: |
          brew update
          brew install \
            bison \
            flex \
            icu4c \
            libxml2 \
            libxslt \
            openssl@3 \
            pkg-config \
            readline \
            xz

      - name: Build PostgreSQL
        run: ci/postgres.sh "${{ inputs.version }}" "${{ matrix.target }}" "$PWD/prefix"

      - name: Package archive
        run: ci/package.sh "${{ inputs.tool }}" "${{ inputs.version }}" "${{ matrix.target }}" "$PWD/prefix" "$PWD/dist"

      - name: Smoke test archive
        run: ci/verify.sh "${{ inputs.tool }}" "dist/db-${{ inputs.tool }}-${{ inputs.version }}-${{ matrix.target }}.tar.xz"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tool }}-${{ inputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "dist/db-${{ inputs.tool }}-${{ inputs.version }}-${{ matrix.target }}.tar.xz" \
              "dist/db-${{ inputs.tool }}-${{ inputs.version }}-${{ matrix.target }}.tar.xz.sha256" \
              --clobber
          else
            gh release create "$tag" \
              "dist/db-${{ inputs.tool }}-${{ inputs.version }}-${{ matrix.target }}.tar.xz" \
              "dist/db-${{ inputs.tool }}-${{ inputs.version }}-${{ matrix.target }}.tar.xz.sha256" \
              --title "$tag" \
              --notes "Prebuilt ${{ inputs.tool }} ${{ inputs.version }} binaries."
          fi
