name: Rebuild a specific binary

on:
  workflow_dispatch:
    inputs:
      tool:
        description: Tool to rebuild, for example postgres.
        required: true
        type: choice
        options:
          - mysql
          - postgres
          - valkey
      version:
        description: Version to rebuild, for example 18.4.
        required: true
        type: string
      target:
        description: Target to rebuild, or all.
        required: true
        default: all
        type: choice
        options:
          - all
          - darwin-amd64
          - darwin-arm64
          - fedora43-amd64
          - fedora43-arm64
          - fedora44-amd64
          - fedora44-arm64
          - ubuntu24-amd64
          - ubuntu24-arm64
          - ubuntu26-amd64
          - ubuntu26-arm64

concurrency:
  group: mise-db-release-builds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  matrix:
    name: Read target matrix
    runs-on: ubuntu-24.04
    outputs:
      darwin_targets: ${{ steps.matrix.outputs.darwin_targets }}
      has_darwin_targets: ${{ steps.matrix.outputs.has_darwin_targets }}
      has_linux_targets: ${{ steps.matrix.outputs.has_linux_targets }}
      linux_targets: ${{ steps.matrix.outputs.linux_targets }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read matrix
        id: matrix
        env:
          TARGET_INPUT: ${{ inputs.target }}
        run: |
          if [ "$TARGET_INPUT" = "all" ]; then
            darwin_targets="$(jq -c .darwin ci/targets.json)"
            linux_targets="$(jq -c .linux ci/targets.json)"
          else
            darwin_targets="$(jq -c --arg target "$TARGET_INPUT" '[.darwin[] | select(.name == $target)]' ci/targets.json)"
            linux_targets="$(jq -c --arg target "$TARGET_INPUT" '[.linux[] | select(.name == $target)]' ci/targets.json)"

            if [ "$darwin_targets" = "[]" ] && [ "$linux_targets" = "[]" ]; then
              echo "unsupported target: $TARGET_INPUT" >&2
              exit 1
            fi
          fi

          echo "darwin_targets=$darwin_targets" >> "$GITHUB_OUTPUT"
          echo "linux_targets=$linux_targets" >> "$GITHUB_OUTPUT"
          echo "has_darwin_targets=$(jq -r 'length > 0' <<< "$darwin_targets")" >> "$GITHUB_OUTPUT"
          echo "has_linux_targets=$(jq -r 'length > 0' <<< "$linux_targets")" >> "$GITHUB_OUTPUT"

  rebuild-linux:
    name: ${{ inputs.tool }} ${{ inputs.version }} ${{ matrix.target.name }}
    needs: matrix
    if: needs.matrix.outputs.has_linux_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.linux_targets) }}

    runs-on: ${{ matrix.target.runner }}
    env:
      TOOL: ${{ inputs.tool }}
      VERSION: ${{ inputs.version }}
      TARGET: ${{ matrix.target.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build and package in distro container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TOOL \
            -e VERSION \
            -e TARGET \
            "${{ matrix.target.image }}" \
            bash -lc 'ci/builders/linux.sh setup && ci/tools/${TOOL}.sh build && ci/tools/${TOOL}.sh package'

      - name: Verify in separate distro container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TOOL \
            -e VERSION \
            -e TARGET \
            "${{ matrix.target.image }}" \
            bash -lc 'ci/builders/linux.sh runtime && ci/tools/${TOOL}.sh verify'

      - name: Restore workspace ownership
        run: sudo chown -R "$(id -u):$(id -g)" dist prefix src

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: "ci/tools/${TOOL}.sh release"

  rebuild-darwin:
    name: ${{ inputs.tool }} ${{ inputs.version }} ${{ matrix.target.name }}
    needs: matrix
    if: needs.matrix.outputs.has_darwin_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.matrix.outputs.darwin_targets) }}

    runs-on: ${{ matrix.target.runner }}
    env:
      TOOL: ${{ inputs.tool }}
      VERSION: ${{ inputs.version }}
      TARGET: ${{ matrix.target.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Darwin build dependencies
        run: ci/builders/darwin.sh setup

      - name: Build, package and verify
        if: steps.existing.outputs.exists != 'true'
        run: "ci/tools/${TOOL}.sh build && ci/tools/${TOOL}.sh package && ci/tools/${TOOL}.sh verify"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: "ci/tools/${TOOL}.sh release"
