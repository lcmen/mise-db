name: Build all binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matrix:
    name: Read build matrix
    runs-on: ubuntu-24.04
    outputs:
      darwin_targets: ${{ steps.matrix.outputs.darwin_targets }}
      linux_targets: ${{ steps.matrix.outputs.linux_targets }}
      tools: ${{ steps.matrix.outputs.tools }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read matrix
        id: matrix
        run: |
          echo "darwin_targets=$(jq -c .darwin ci/targets.json)" >> "$GITHUB_OUTPUT"
          echo "linux_targets=$(jq -c .linux ci/targets.json)" >> "$GITHUB_OUTPUT"
          echo "tools=$(jq -c . ci/tools.json)" >> "$GITHUB_OUTPUT"

  build-linux:
    name: ${{ matrix.tool.tool }} ${{ matrix.tool.version }} ${{ matrix.target.name }}
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJSON(needs.matrix.outputs.tools) }}
        target: ${{ fromJSON(needs.matrix.outputs.linux_targets) }}

    runs-on: ${{ matrix.target.runner }}
    env:
      TOOL: ${{ matrix.tool.tool }}
      VERSION: ${{ matrix.tool.version }}
      TARGET: ${{ matrix.target.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check existing release assets
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: ci/released.sh "$TOOL" "$VERSION" "$TARGET"

      - name: Build and package in distro container
        if: steps.existing.outputs.exists != 'true'
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TOOL \
            -e VERSION \
            -e TARGET \
            "${{ matrix.target.image }}" \
            bash -lc 'ci/builders/linux.sh setup && ci/tools/${TOOL}.sh build && ci/tools/${TOOL}.sh package'

      - name: Verify in separate distro container
        if: steps.existing.outputs.exists != 'true'
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e TOOL \
            -e VERSION \
            -e TARGET \
            "${{ matrix.target.image }}" \
            bash -lc 'ci/builders/linux.sh runtime && ci/tools/${TOOL}.sh verify'

      - name: Restore workspace ownership
        if: steps.existing.outputs.exists != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" dist prefix src

      - name: Create or update release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: "ci/tools/${TOOL}.sh release"

  build-darwin:
    name: ${{ matrix.tool.tool }} ${{ matrix.tool.version }} ${{ matrix.target.name }}
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        tool: ${{ fromJSON(needs.matrix.outputs.tools) }}
        target: ${{ fromJSON(needs.matrix.outputs.darwin_targets) }}

    runs-on: ${{ matrix.target.runner }}
    env:
      TOOL: ${{ matrix.tool.tool }}
      VERSION: ${{ matrix.tool.version }}
      TARGET: ${{ matrix.target.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check existing release assets
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: ci/released.sh "$TOOL" "$VERSION" "$TARGET"

      - name: Install Darwin build dependencies
        if: steps.existing.outputs.exists != 'true'
        run: ci/builders/darwin.sh setup

      - name: Build, package and verify
        if: steps.existing.outputs.exists != 'true'
        run: "ci/tools/${TOOL}.sh build && ci/tools/${TOOL}.sh package && ci/tools/${TOOL}.sh verify"

      - name: Create or update release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: "ci/tools/${TOOL}.sh release"
