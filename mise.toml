[tools]
"aqua:Kampfkarren/selene" = "latest"
hk = "latest"
pkl = "latest"
shellcheck = "latest"
stylua = "latest"

[tasks.check]
description = "Run hk checks on all files"
run = "hk check --all"

[tasks.fix]
description = "Run hk fixes on all files"
run = "hk fix --all --no-stage"

[tasks.hooks]
description = "Install hk git hooks through mise"
run = "hk install --mise"

[tasks.pre-commit]
description = "Run hk pre-commit hook"
run = "hk run pre-commit"
